[build]
  command = "next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

# Primary handler: Next.js app/api/submit-lead.
# Uncomment only for webhook-only deploys without the Next.js API route:
# [[redirects]]
#   from = "/api/submit-lead"
#   to = "/.netlify/functions/submit-lead"
#   status = 200
#   force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
